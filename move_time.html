<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move Time - Trip Status Form</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        select, input[type="text"], textarea {
            width: 100%; padding: 15px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 16px;
        }
        select:focus, input:focus { outline: none; border-color: #667eea; }
        .status-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .status-option { position: relative; }
        .status-option input { position: absolute; opacity: 0; }
        .status-option label {
            display: block; padding: 15px; background: #f5f5f5;
            border-radius: 10px; text-align: center; cursor: pointer;
            margin: 0; font-weight: normal;
        }
        .status-option input:checked + label {
            background: #667eea; color: white; font-weight: 600;
        }
        .submit-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 18px; font-weight: 600; cursor: pointer;
        }
        .success {
            display: none; background: #4caf50; color: white;
            padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚛 Move Time</h1>
        <p class="subtitle" style="font-size: 16px; color: #555;">Trip Update / سفر کی تازہ ترین معلومات</p>
        
        <!-- Replace FORMSPREE_ID with your actual Formspree form ID -->
        <form action="https://formspree.io/f/FORMSPREE_ID" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="_subject" value="Move Time Status Update">
            <input type="hidden" name="vendor" value="Move Time">
            
            <!-- Driver Info Display -->
            <div class="form-group" style="background: #e8f5e9; padding: 15px; border-radius: 10px; border-right: 4px solid #4caf50;">
                <label style="color: #2e7d32; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Driver / ڈرائیور</label>
                <input type="text" id="driver" name="driver" style="background: transparent; border: none; font-size: 18px; font-weight: bold; color: #1b5e20; padding: 5px 0;" required>
            </div>
            
            <div class="form-group" style="background: #fff3e0; padding: 15px; border-radius: 10px; border-right: 4px solid #ff9800;">
                <label style="color: #e65100; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Truck Number / ٹرک نمبر</label>
                <input type="text" id="truck" name="truck" style="background: transparent; border: none; font-size: 18px; font-weight: bold; color: #e65100; padding: 5px 0;" required>
            </div>
            
            <!-- Empty Container Section (Above) -->
            <div class="form-group">
                <label style="font-size: 16px; background: #e8f5e9; padding: 10px; border-radius: 8px; display: block; margin-bottom: 15px; text-align: center;">
                    🔄 Empty Container / خالی کنٹینر
                </label>
                <div class="status-grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="status-option">
                        <input type="radio" name="status" id="waiting_loading_empty" value="Waiting Nearby Loading Area">
                        <label for="waiting_loading_empty" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">⏳</span>
                            <strong>Waiting Nearby Loading</strong><br>
                            <strong style="font-size: 12px; color: #333;">لوڈنگ کے قریب انتظار</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="waiting_unloading" value="Waiting Nearby Unloading Area">
                        <label for="waiting_unloading" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">🕐</span>
                            <strong>Waiting Nearby Unloading</strong><br>
                            <strong style="font-size: 12px; color: #333;">ان لوڈنگ کے قریب انتظار</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="unloaded_inside" value="Unloaded but Inside">
                        <label for="unloaded_inside" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">✅</span>
                            <strong>Unloaded but Inside</strong><br>
                            <strong style="font-size: 12px; color: #333;">خالی ہوا - اندر</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="empty_left" value="Empty and Left">
                        <label for="empty_left" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">🚗</span>
                            <strong>Empty and Left</strong><br>
                            <strong style="font-size: 12px; color: #333;">خالی - چلے گئے</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="empty_returning" value="Empty - Returning">
                        <label for="empty_returning" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">🛣️</span>
                            <strong>Empty - Returning</strong><br>
                            <strong style="font-size: 12px; color: #333;">خالی - واپس</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="loaded_but_inside" value="Loaded but Inside">
                        <label for="loaded_but_inside" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">📦</span>
                            <strong>Loaded but Inside</strong><br>
                            <strong style="font-size: 12px; color: #333;">لوڈ شدہ - اندر</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="loaded_and_left" value="Loaded and Left">
                        <label for="loaded_and_left" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">🚚</span>
                            <strong>Loaded and Left</strong><br>
                            <strong style="font-size: 12px; color: #333;">لوڈ شدہ - چلے گئے</strong>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Filled Container Section (Below) -->
            <div class="form-group">
                <label style="font-size: 16px; background: #e3f2fd; padding: 10px; border-radius: 8px; display: block; margin-bottom: 15px; text-align: center;">
                    📦 Filled Container / بھرا ہوا کنٹینر
                </label>
                <div class="status-grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="status-option">
                        <input type="radio" name="status" id="waiting_emptying" value="Waiting Nearby Emptying Container Area">
                        <label for="waiting_emptying" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">⏳</span>
                            <strong>Waiting Nearby Emptying</strong><br>
                            <strong style="font-size: 12px; color: #333;">خالی کرنے کے قریب انتظار</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="waiting_loading_filled" value="Waiting Nearby Loading Area">
                        <label for="waiting_loading_filled" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">🕐</span>
                            <strong>Waiting Nearby Loading</strong><br>
                            <strong style="font-size: 12px; color: #333;">لوڈنگ کے قریب انتظار</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="loaded_inside" value="Loaded and Inside">
                        <label for="loaded_inside" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">📦</span>
                            <strong>Loaded and Inside</strong><br>
                            <strong style="font-size: 12px; color: #333;">لوڈ شدہ - اندر</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="loaded_outside" value="Loaded and Outside">
                        <label for="loaded_outside" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">🚛</span>
                            <strong>Loaded and Outside</strong><br>
                            <strong style="font-size: 12px; color: #333;">لوڈ شدہ - باہر</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="empty_left_filled" value="Empty and Left">
                        <label for="empty_left_filled" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">🚗</span>
                            <strong>Empty and Left</strong><br>
                            <strong style="font-size: 12px; color: #333;">خالی - چلے گئے</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="empty_returning_filled" value="Empty - Returning">
                        <label for="empty_returning_filled" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">🛣️</span>
                            <strong>Empty - Returning</strong><br>
                            <strong style="font-size: 12px; color: #333;">خالی - واپس</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="waiting_returning_empty" value="Waiting Nearby Returning Empty Container Area">
                        <label for="waiting_returning_empty" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">🔄</span>
                            <strong>Waiting Nearby Returning</strong><br>
                            <strong style="font-size: 12px; color: #333;">خالی واپسی کے قریب</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="empty_offloaded_inside" value="Empty Container Offloaded but Inside">
                        <label for="empty_offloaded_inside" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">📍</span>
                            <strong>Empty Offloaded Inside</strong><br>
                            <strong style="font-size: 12px; color: #333;">خالی اتارا - اندر</strong>
                        </label>
                    </div>
                    <div class="status-option">
                        <input type="radio" name="status" id="empty_offloaded_outside" value="Empty Container Offloaded and Outside">
                        <label for="empty_offloaded_outside" style="font-size: 13px; padding: 12px 8px;">
                            <span style="font-size: 20px; display: block; margin-bottom: 5px;">🚪</span>
                            <strong>Empty Offloaded Outside</strong><br>
                            <strong style="font-size: 12px; color: #333;">خالی اتارا - باہر</strong>
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label style="font-size: 16px;">🗺️ Current Location / موجودہ مقام</label>
                <select name="location" style="font-size: 16px;">
                    <option value="">-- Select / منتخب کریں --</option>
                    <option value="Dammam Port">⚓ Dammam Port / دمام بندرگاہ</option>
                    <option value="Jubail Port">⚓ Jubail Port / الجبیل بندرگاہ</option>
                    <option value="Riyadh">🏙️ Riyadh / ریاض</option>
                    <option value="Jeddah">🏙️ Jeddah / جدہ</option>
                    <option value="On the Way">🛣️ On the Way / راستے میں</option>
                    <option value="Factory">🏭 Factory / فیکٹری</option>
                    <option value="Border">🛂 Border / سرحد</option>
                    <option value="Other">📍 Other / دیگر</option>
                </select>
            </div>
            
            <div class="form-group">
                <label style="font-size: 16px;">🎯 Heading To / کہاں جا رہے ہیں</label>
                <select name="heading_to" style="font-size: 16px;">
                    <option value="">-- Select Destination / منزل منتخب کریں --</option>
                    <option value="Dammam Port">⚓ Dammam Port / دمام بندرگاہ</option>
                    <option value="Jubail Port">⚓ Jubail Port / الجبیل بندرگاہ</option>
                    <option value="Riyadh">🏙️ Riyadh / ریاض</option>
                    <option value="Jeddah">🏙️ Jeddah / جدہ</option>
                    <option value="Factory">🏭 Factory / فیکٹری</option>
                    <option value="Warehouse">🏢 Warehouse / گودام</option>
                    <option value="Border">🛂 Border / سرحد</option>
                    <option value="Waiting for Load">⏳ Waiting for Load / لوڈ کا انتظار</option>
                    <option value="Other">📍 Other / دیگر</option>
                </select>
            </div>
            
            <div class="form-group">
                <label style="font-size: 16px;">📸 Container Photo / کنٹینر کی تصویر <span style="color: red;">*</span></label>
                <div style="border: 3px dashed #ccc; border-radius: 15px; padding: 30px; text-align: center; background: #fafafa;">
                    <input type="file" name="photo" accept="image/*" capture="camera" required 
                           style="display: none;" id="photo-input">
                    <label for="photo-input" style="cursor: pointer; margin: 0;">
                        <div style="font-size: 48px; margin-bottom: 10px;">📷</div>
                        <div style="font-size: 16px; color: #333; font-weight: 600;">Tap to Take Photo</div>
                        <div style="font-size: 14px; color: #666; margin-top: 5px;">تصویر لینے کے لیے دبائیں</div>
                    </label>
                </div>
                <p style="font-size: 13px; color: #666; margin-top: 10px; text-align: center;">
                    📋 Container number should be visible / کنٹینر نمبر واضح نظر آنا چاہیے
                </p>
            </div>
            
            <div class="form-group">
                <label style="font-size: 16px;">📝 Notes / نوٹس (Optional)</label>
                <textarea name="notes" rows="3" placeholder="Koi masla hai? Yahan likhein... / کوئی مسئلہ ہے؟ یہاں لکھیں..." 
                          style="font-size: 16px;"></textarea>
            </div>
            
            <button type="submit" class="submit-btn" style="font-size: 20px;">
                ✅ Send Update / اپڈیٹ بھیجیں
            </button>
            
            <p style="text-align: center; margin-top: 15px; font-size: 13px; color: #888;">
                🔒 Your information is safe / آپ کی معلومات محفوظ ہے
            </p>
        </form>
        
        <div id="success" class="success" style="padding: 30px;">
            <div style="font-size: 48px; margin-bottom: 10px;">🎉</div>
            <h2 style="margin-bottom: 10px;">Thank You! / شکریہ!</h2>
            <p style="font-size: 16px;">Your update has been sent successfully.</p>
            <p style="font-size: 16px;">آپ کی معلومات کامیابی سے بھیج دی گئی ہے۔</p>
        </div>
    </div>
    
    <script>
        document.querySelector('form').addEventListener('submit', function() {
            document.getElementById('success').style.display = 'block';
        });

        // Get URL parameters
        function getUrlParams() {
            const params = {};
            const queryString = window.location.search.slice(1);
            const pairs = queryString.split('&');
            for (let pair of pairs) {
                const [key, value] = pair.split('=');
                if (key && value) {
                    params[decodeURIComponent(key)] = decodeURIComponent(value.replace(/\+/g, ' '));
                }
            }
            return params;
        }

        // Pre-fill form on page load
        window.onload = function() {
            const params = getUrlParams();
            
            // Pre-fill driver name
            if (params.driver) {
                document.getElementById('driver').value = params.driver;
                document.getElementById('driver').readOnly = true;
            }
            
            // Pre-fill truck number
            if (params.truck) {
                document.getElementById('truck').value = params.truck;
                document.getElementById('truck').readOnly = true;
            }
            
            // Pre-fill container
            if (params.container) {
                document.getElementById('container').value = params.container;
            }
            
            // Show driver info banner
            if (params.driver) {
                const banner = document.createElement('div');
                banner.style.cssText = 'background: #e3f2fd; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #2196f3;';
                banner.innerHTML = '<strong>👤 Driver:</strong> ' + params.driver + '<br><strong>🚛 Truck:</strong> ' + (params.truck || 'N/A');
                document.querySelector('.container').insertBefore(banner, document.querySelector('h1').nextSibling);
            }
        };

        // Prevent going back to menu
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            history.pushState(null, null, location.href);
        };
    </script>

    <script>
        // Force reload if page is cached (check if loaded from cache)
        if (performance.navigation.type === 2) {
            location.reload(true);
        }
    </script>
</body>
</html>
